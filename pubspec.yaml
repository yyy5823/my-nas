name: my_nas
description: "跨平台 NAS 客户端 - 统一管理你的 NAS 资源"
publish_to: "none"
version: 1.0.0+5

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  cached_network_image: ^3.4.1
  lottie: ^3.3.1 # Professional loading animations

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # Network
  dio: ^5.8.0+1
  retrofit: ">=4.4.2 <4.9.0"
  connectivity_plus: ^6.1.1

  # Local Storage
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Data Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Utils
  intl: ^0.20.2
  logger: ^2.5.0
  path: ^1.9.1
  collection: ^1.19.1
  uuid: ^4.5.1
  xml: ^6.5.0

  # Markdown
  flutter_markdown: ^0.7.6
  markdown: ^7.2.2

  # Crypto
  crypto: ^3.0.6
  pointycastle: ^3.9.1

  # AI / Machine Learning
  tflite_flutter: ^0.11.0 # TensorFlow Lite for face detection & recognition
  google_mlkit_face_detection: ^0.12.0 # Face detection for mobile (iOS/Android)

  # Mobile Device Media Access (iOS/Android)
  photo_manager: ^3.6.4 # Access system photo library
  on_audio_query: ^2.9.0 # Access system music library

  # Media - Video
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # FFmpeg for client-side transcoding (iOS/Android/macOS)
  # 使用本地副本，原项目 ffmpeg_kit_flutter 已于 2025年1月退役
  # 包含 FFmpeg v8.0.0 和 FFprobe，支持常用音视频编解码器
  ffmpeg_kit_flutter_new:
    path: packages/ffmpeg_kit_flutter_fixed

  # Media - Audio
  just_audio: ^0.9.42
  just_audio_windows: ^0.2.2
  just_audio_media_kit: ^2.1.0 # macOS/Linux support (uses media_kit_libs_video)
  media_kit_libs_linux: ^1.1.3 # Linux audio libs
  # audio_service: 使用本地修复版本
  # 修复 iOS playbackState 不设置的 bug (Issue #1139, PR #1140)
  # 原因: #if TARGET_OS_OSX 错误地排除了 iOS
  audio_service:
    path: packages/audio_service_fixed
  audio_session: ^0.1.25

  # Media - Casting (DLNA/AirPlay)
  dlna_dart: ^0.0.6 # DLNA/UPnP casting
  shelf: ^1.4.1 # Local HTTP server for media proxy
  shelf_router: ^1.1.4 # HTTP routing
  network_info_plus: ^6.1.1 # Get local IP address

  http: ^1.6.0
  file_picker: ^10.3.7
  webdav_client: ^1.2.2
  package_info_plus: ^9.0.0
  # SMB 协议支持（使用本地 fork 修复移动端 OOM 问题）
  smb_connect:
    path: packages/smb_connect
  url_launcher: ^6.3.1
  open_filex: ^4.5.0

  # Share & Save
  share_plus: ^10.1.4
  gal: ^2.3.0

  # Ebook & Comic Reading
  pdfrx: ^1.0.96 # Cross-platform PDF viewer
  photo_view: ^0.15.0 # Pinch-to-zoom for comic pages
  scrollable_positioned_list: ^0.3.8 # For efficient scrolling in reader
  archive: ^4.0.7 # ZIP/CBZ archive handling (upgraded for lottie compatibility)
  audio_metadata_reader: ^1.4.2
  # audiotags: 使用本地修复版本
  # 原因: libaudiotags.a 与 macOS 26.1 SDK 不兼容，iOS 也有链接问题
  # 解决方案: macOS/iOS 上禁用 Rust 库，使用 FFmpeg 后备
  audiotags:
    path: packages/audiotags_fixed
  image: ^4.3.0
  flutter_native_splash: ^2.4.4
  sqflite_common_ffi: ^2.4.0
  sqlite3_flutter_libs: ^0.5.24 # Provides SQLite native libraries for desktop

  # Live Activities (Dynamic Island)
  live_activities: ^2.3.0
  app_links: ^6.3.3 # Deep link handling for Dynamic Island controls
  encrypt: ^5.0.3
  charset_converter: ^2.3.0
  enough_convert: ^1.6.0
  wakelock_plus: ^1.4.0
  epub_plus: ^5.1.0
  flutter_html: ^3.0.0
  flutter_widget_from_html_core: ^0.15.2 # Lightweight HTML rendering for native e-book reader
  html: ^0.15.4 # HTML parsing for web scraping
  xpath_selector_html_parser: ^3.0.1 # XPath parsing for Legado book sources
  json_path: ^0.7.4 # JSONPath parsing for Legado book sources
  flutter_foliate_viewer:
    path: packages/flutter_foliate_viewer
  dart_amqp: ^0.3.1
  device_info_plus: ^12.3.0
  flutter_foreground_task: ^9.1.0
  battery_plus: ^6.2.1 # Battery info for reader status bar
  flutter_inappwebview: ^6.1.5 # WebView for precise book pagination
  visibility_detector: ^0.4.0+2 # Lazy load book covers when visible

  # Picture in Picture
  floating: ^6.0.0 # Android/iOS PiP support
  window_manager: ^0.4.3 # Desktop window control

  # Desktop Lyrics & Menu Bar
  desktop_multi_window: ^0.2.0 # Multi-window support for desktop lyrics (macOS only)
  flutter_acrylic: ^1.1.4 # Transparent/acrylic window effects
  hotkey_manager: ^0.2.3 # Global hotkey support for desktop
  win32: ^5.10.0 # Windows API for native desktop lyrics window
  bonsoir: ^6.0.1 # Native mDNS/Bonjour discovery (iOS/Android/macOS/Windows/Linux)
  ffi: ^2.1.4
  screen_brightness: ^2.1.7
  flutter_shaders: ^0.1.3

  # Text-to-Speech for book reading aloud
  # 使用本地修复版本，修复 Android 插件包路径问题
  # (原 com.eyedeadevelopment.fluttertts -> com.tundralabs.fluttertts)
  flutter_tts:
    path: packages/flutter_tts_fixed

  # Edge TTS (高品质在线语音合成)
  web_socket_channel: ^2.4.0  # WebSocket 通信

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.4

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  retrofit_generator: ^9.2.0
  injectable_generator: ^2.6.3
  hive_ce_generator: ^1.7.0

  # Icon & Splash Generation
  flutter_launcher_icons: ^0.14.2

  # Windows MSIX Packaging
  msix: ^3.16.12

flutter:
  uses-material-design: true

  shaders:
    - shaders/page_curl.frag

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo.png
    - assets/ml_models/
    - assets/animations/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf

# MSIX 打包配置 (Windows)
msix_config:
  display_name: MyNAS
  publisher_display_name: kkape
  identity_name: com.kkape.mynas
  msix_version: 1.0.0.0
  capabilities: internetClient, privateNetworkClientServer
  languages: zh-cn, en-us

# Flutter Launcher Icons 配置
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
  macos:
    generate: true
    image_path: "assets/logo.png"
  linux:
    generate: true
    image_path: "assets/logo.png"

# Flutter Native Splash 配置
# 只使用纯色背景，不显示 logo（logo 在 StartupPage 中显示动画效果）
flutter_native_splash:
  color: "#0F0F1A"
  android: true
  ios: true
  web: true
  android_12:
    color: "#0F0F1A"
