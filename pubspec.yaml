name: my_nas
description: "跨平台 NAS 客户端 - 统一管理你的 NAS 资源"
publish_to: 'none'
version: 0.1.6+5

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  cached_network_image: ^3.4.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # Network
  dio: ^5.8.0+1
  retrofit: ^4.4.2

  # Local Storage
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Data Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Utils
  intl: ^0.20.2
  logger: ^2.5.0
  path: ^1.9.1
  collection: ^1.19.1
  uuid: ^4.5.1

  # Crypto
  pointycastle: ^3.9.1

  # Media - Video
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Media - Audio
  just_audio: ^0.9.42
  audio_service: ^0.18.17
  audio_session: ^0.1.25
  http: ^1.6.0
  file_picker: ^10.3.7
  webdav_client: ^1.2.2
  package_info_plus: ^9.0.0
  smb_connect: ^0.0.9
  url_launcher: ^6.3.1
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  retrofit_generator: ^9.1.10
  injectable_generator: ^2.6.3
  hive_ce_generator: ^1.7.0

  # Icon & Splash Generation
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo.png

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf

# MSIX 打包配置 (Windows)
msix_config:
  display_name: MyNAS
  publisher_display_name: kkape
  identity_name: com.kkape.nas
  msix_version: 0.1.5.0
  capabilities: internetClient, privateNetworkClientServer
  languages: zh-cn, en-us

# Flutter Launcher Icons 配置
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
  macos:
    generate: true
    image_path: "assets/logo.png"
  linux:
    generate: true
    image_path: "assets/logo.png"

# Flutter Native Splash 配置
# 只使用纯色背景，不显示 logo（logo 在 StartupPage 中显示动画效果）
flutter_native_splash:
  color: "#0F0F1A"
  android: true
  ios: true
  web: true
  android_12:
    color: "#0F0F1A"
