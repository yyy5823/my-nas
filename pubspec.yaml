name: my_nas
description: "跨平台 NAS 客户端 - 统一管理你的 NAS 资源"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  gap: ^3.0.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # Network
  dio: ^5.8.0+1
  retrofit: ^4.4.2

  # Local Storage
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Data Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Utils
  intl: ^0.20.2
  logger: ^2.5.0
  path: ^1.9.1
  collection: ^1.19.1

  # Media - Video
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Media - Audio
  just_audio: ^0.9.42
  audio_service: ^0.18.17
  audio_session: ^0.1.25

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  retrofit_generator: ^9.1.10
  injectable_generator: ^2.6.3
  hive_ce_generator: ^1.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
