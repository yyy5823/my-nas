name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  # 也支持手动推送 tag 触发
  create:
    tags:
      - 'v*'
  # 支持手动触发
  workflow_dispatch:
    inputs:
      force_release:
        description: '强制发布（忽略版本检查）'
        required: false
        type: boolean
        default: false

jobs:
  # 检查是否需要发布
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      version_code: ${{ steps.check.outputs.version_code }}
      full_version: ${{ steps.check.outputs.full_version }}
      is_tag: ${{ steps.check.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: check
        run: |
          # 解析 pubspec.yaml 版本号 X.Y.Z+N
          # X.Y.Z 用于 tag 与发布展示；N 是 build number（versionCode/CFBundleVersion），
          # 仅用于商店递增，不参与 tag 名（避免 1.0.1+6 也能发正式版 v1.0.1）
          FULL_VERSION_RAW=$(grep "^version:" pubspec.yaml | sed 's/version: //' | tr -d ' ')
          CURRENT_VERSION=$(echo "$FULL_VERSION_RAW" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$FULL_VERSION_RAW" | cut -d'+' -f2)

          if [ "$VERSION_CODE" == "$CURRENT_VERSION" ]; then
            VERSION_CODE="1"
          fi

          # tag 与展示版本始终用 X.Y.Z（含 -alpha/-beta/-rc 等 semver 预发布后缀）
          FULL_VERSION="$CURRENT_VERSION"

          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION, Build: $VERSION_CODE, Tag: v$FULL_VERSION"

          # 检查是否是 tag 触发
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Triggered by tag: ${{ github.ref_name }}"
            exit 0
          fi

          echo "is_tag=false" >> $GITHUB_OUTPUT

          # 检查是否是手动触发且强制发布
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ inputs.force_release }}" == "true" ]; then
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "Force release triggered manually"
              exit 0
            fi
            # 手动触发但不强制，检查 tag 是否存在
            if git ls-remote --tags origin | grep -q "refs/tags/v${FULL_VERSION}$"; then
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "Tag v$FULL_VERSION already exists, skipping release"
            else
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "Manual trigger: will create release for $FULL_VERSION"
            fi
            exit 0
          fi

          # 检查 pubspec.yaml 是否在本次提交中被修改
          if ! git diff HEAD~1 HEAD --name-only | grep -q "^pubspec.yaml$"; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "pubspec.yaml not changed, skipping release"
            exit 0
          fi

          # 检查版本是否改变（包括 build number）
          if git diff HEAD~1 HEAD -- pubspec.yaml | grep -q "^+version:"; then
            # 检查该版本的 tag 是否已存在
            if git ls-remote --tags origin | grep -q "refs/tags/v${FULL_VERSION}$"; then
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "Tag v$FULL_VERSION already exists, skipping release"
            else
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "Version changed to $FULL_VERSION, will create release"
            fi
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Version not changed in pubspec.yaml, skipping release"
          fi

  # 创建 Tag
  create-tag:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true' && needs.check-release.outputs.is_tag == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        id: create_tag
        run: |
          TAG_NAME="v${{ needs.check-release.outputs.full_version }}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

          echo "Created tag: $TAG_NAME"

  # 提取版本信息（用于后续构建）
  extract-version:
    needs: [check-release, create-tag]
    if: always() && needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.check-release.outputs.version }}
      version_code: ${{ needs.check-release.outputs.version_code }}
      full_version: ${{ needs.check-release.outputs.full_version }}
      tag_name: ${{ steps.get_tag.outputs.tag_name }}
    steps:
      - name: Get tag name
        id: get_tag
        run: |
          if [ "${{ needs.check-release.outputs.is_tag }}" == "true" ]; then
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=v${{ needs.check-release.outputs.full_version }}" >> $GITHUB_OUTPUT
          fi

  # 构建 Android APK（多架构）
  build-android:
    needs: extract-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # 限制 Gradle daemon 内存使用
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx3g"
    steps:
      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h
          # 删除不需要的预装软件以释放空间
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk/25*
          sudo rm -rf /usr/local/lib/android/sdk/ndk/26*
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "=== After cleanup ==="
          df -h

      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 预下载 Gradle，避免构建时网络问题
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

      - name: Pre-download Gradle (with retry)
        run: |
          cd android
          for i in {1..3}; do
            ./gradlew --version --no-daemon && break || {
              echo "Attempt $i failed, retrying in 10s..."
              sleep 10
            }
          done

      # 清理缓存避免 "Already watching path" 问题
      - name: Clean Flutter build cache
        run: |
          flutter clean
          rm -rf ~/.pub-cache/hosted/pub.dev/*/
          rm -rf build/
          rm -rf .dart_tool/

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # 构建分架构 APK (使用 --no-daemon 避免文件监控冲突)
      - name: Build APK (split per ABI)
        run: |
          cd android && ./gradlew --stop || true
          cd ..
          flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk MyNAS-${{ needs.extract-version.outputs.version }}-android-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk MyNAS-${{ needs.extract-version.outputs.version }}-android-armeabi-v7a.apk
          mv app-x86_64-release.apk MyNAS-${{ needs.extract-version.outputs.version }}-android-x86_64.apk

      # 也构建一个通用 APK（包含所有架构）
      - name: Build universal APK
        run: flutter build apk --release

      - name: Rename universal APK
        run: |
          cd build/app/outputs/flutter-apk
          mv app-release.apk MyNAS-${{ needs.extract-version.outputs.version }}-android-universal.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/MyNAS-*.apk
          retention-days: 3

  # 构建 iOS IPA
  build-ios:
    needs: extract-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # 清理并重新安装 CocoaPods 依赖
      - name: Clean and install pods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update || true
          pod install --repo-update

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r MyNAS-${{ needs.extract-version.outputs.version }}-ios-arm64.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/MyNAS-*.ipa
          retention-days: 3

  # 构建 macOS（Intel + Apple Silicon）
  build-macos:
    needs: extract-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13        # Intel (x86_64)
            arch: x86_64
          - os: macos-latest    # Apple Silicon (arm64)
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 验证 checkout 完整性
      - name: Verify checkout
        run: |
          echo "=== Workspace contents ==="
          ls -la
          echo "=== macOS directory ==="
          ls -la macos/ || echo "ERROR: macos directory not found!"
          echo "=== macOS Runner.xcodeproj ==="
          ls -la macos/Runner.xcodeproj/ || echo "ERROR: Runner.xcodeproj not found!"
          echo "=== project.pbxproj ==="
          ls -la macos/Runner.xcodeproj/project.pbxproj || echo "ERROR: project.pbxproj not found!"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      # 确保 macOS 平台配置正确
      - name: Setup macOS platform
        run: |
          # 显示当前状态
          echo "=== Before setup ==="
          ls -la macos/Runner.xcodeproj/ 2>/dev/null || echo "Runner.xcodeproj not found"

          # 强制重新创建 macOS 平台配置以确保完整性
          echo "Ensuring macOS platform is properly configured..."
          flutter create --platforms=macos --org com.kkape .

          echo "=== After setup ==="
          ls -la macos/Runner.xcodeproj/

          # 修改 macOS 部署目标为 11.0（file_picker 等插件需要）
          echo "Updating macOS deployment target to 11.0..."
          sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = 10\.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = 11.0;/g' macos/Runner.xcodeproj/project.pbxproj
          echo "Deployment target updated"

          # 预缓存 macOS 工具链
          flutter precache --macos

      # 清理可能损坏的 native assets 缓存
      - name: Clean native assets cache
        run: |
          rm -rf ~/.pub-cache/hosted/pub.dev/sqlite3-*/
          rm -rf .dart_tool/native_assets_builder/
          rm -rf build/

      - name: Get dependencies
        run: flutter pub get

      # 清理并重建 native assets (sqlite3)
      - name: Clean and rebuild native assets
        run: |
          flutter clean
          flutter pub get
          dart run build_runner clean || true

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # 验证 Flutter 可以识别 macOS 项目
      - name: Verify Flutter recognizes macOS
        run: |
          echo "=== Flutter devices ==="
          flutter devices

          echo "=== Flutter config ==="
          flutter config

          echo "=== Check Flutter can build macOS ==="
          flutter build macos --help > /dev/null 2>&1 && echo "macOS build available" || echo "macOS build NOT available"

          echo "=== Flutter doctor ==="
          flutter doctor -v

      # 禁用代码签名以在 CI 环境中构建
      - name: Disable code signing
        run: |
          # 修改 Xcode 项目配置，禁用代码签名
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "-";/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' macos/Runner.xcodeproj/project.pbxproj

          # 对于 Release 配置，确保禁用签名
          echo "Code signing disabled for CI build"

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "MyNAS" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "my_nas.app" 150 185 \
            --hide-extension "my_nas.app" \
            --app-drop-link 450 185 \
            "MyNAS-${{ needs.extract-version.outputs.version }}-macos-${{ matrix.arch }}.dmg" \
            "build/macos/Build/Products/Release/my_nas.app" || true

          # 如果 create-dmg 失败，创建简单的 zip
          if [ ! -f "MyNAS-${{ needs.extract-version.outputs.version }}-macos-${{ matrix.arch }}.dmg" ]; then
            cd build/macos/Build/Products/Release
            zip -r ../../../../../MyNAS-${{ needs.extract-version.outputs.version }}-macos-${{ matrix.arch }}.zip my_nas.app
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-${{ matrix.arch }}
          retention-days: 3
          path: |
            MyNAS-*.dmg
            MyNAS-*.zip

  # 构建 Windows x64
  build-windows:
    needs: extract-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 检查是否有 Windows 支持
      - name: Check Windows support
        id: check_windows
        shell: bash
        run: |
          if [ -d "windows" ]; then
            echo "supported=true" >> $GITHUB_OUTPUT
          else
            echo "supported=false" >> $GITHUB_OUTPUT
            echo "::warning::Windows platform not configured in this project"
          fi

      - name: Enable Windows desktop
        if: steps.check_windows.outputs.supported == 'true'
        run: flutter config --enable-windows-desktop

      # 清理可能损坏的构建缓存
      - name: Clean build cache
        if: steps.check_windows.outputs.supported == 'true'
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path .dart_tool) { Remove-Item -Recurse -Force .dart_tool }

      - name: Get dependencies
        if: steps.check_windows.outputs.supported == 'true'
        run: flutter pub get

      - name: Generate code
        if: steps.check_windows.outputs.supported == 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      # 重试构建（如果失败，清理后重试一次）
      - name: Build Windows x64 (with retry)
        if: steps.check_windows.outputs.supported == 'true'
        run: |
          try {
            flutter build windows --release
          } catch {
            Write-Host "First build attempt failed, cleaning and retrying..."
            if (Test-Path build\windows) { Remove-Item -Recurse -Force build\windows }
            flutter clean
            flutter pub get
            flutter build windows --release
          }

      - name: Create ZIP (Portable)
        if: steps.check_windows.outputs.supported == 'true'
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath MyNAS-${{ needs.extract-version.outputs.version }}-windows-x64-portable.zip

      # 创建 MSIX 安装包
      - name: Create MSIX installer
        if: steps.check_windows.outputs.supported == 'true'
        run: |
          dart pub global activate msix
          dart pub global run msix:create --build-windows false --output-path . --output-name MyNAS-${{ needs.extract-version.outputs.version }}-windows-x64
        continue-on-error: true

      # 创建 EXE 安装包 (使用 Inno Setup)
      - name: Install Inno Setup
        if: steps.check_windows.outputs.supported == 'true'
        run: choco install innosetup -y

      - name: Create Inno Setup script
        if: steps.check_windows.outputs.supported == 'true'
        shell: pwsh
        run: |
          $version = "${{ needs.extract-version.outputs.version }}"
          $script = @"
          [Setup]
          AppName=MyNAS
          AppVersion=$version
          AppPublisher=MyNAS
          DefaultDirName={autopf}\MyNAS
          DefaultGroupName=MyNAS
          OutputDir=.
          OutputBaseFilename=MyNAS-$version-windows-x64-setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

          [Icons]
          Name: "{group}\MyNAS"; Filename: "{app}\my_nas.exe"
          Name: "{group}\Uninstall MyNAS"; Filename: "{uninstallexe}"
          Name: "{commondesktop}\MyNAS"; Filename: "{app}\my_nas.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"

          [Run]
          Filename: "{app}\my_nas.exe"; Description: "Launch MyNAS"; Flags: nowait postinstall skipifsilent
          "@
          $script | Out-File -FilePath "installer.iss" -Encoding UTF8

      - name: Build EXE installer
        if: steps.check_windows.outputs.supported == 'true'
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        continue-on-error: true

      - name: Upload Windows artifact
        if: steps.check_windows.outputs.supported == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          retention-days: 3
          path: |
            MyNAS-*-windows-*.zip
            MyNAS-*-windows-*.msix
            MyNAS-*-windows-*-setup.exe

  # 构建 Linux x64
  build-linux:
    needs: extract-version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev libsecret-1-dev libkeybinder-3.0-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      # 清理可能损坏的构建缓存
      - name: Clean build cache
        run: |
          rm -rf build/
          rm -rf .dart_tool/

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # 重试构建（如果失败，清理后重试一次）
      - name: Build Linux (with retry)
        run: |
          if ! flutter build linux --release; then
            echo "First build attempt failed, cleaning and retrying..."
            rm -rf build/linux
            flutter clean
            flutter pub get
            flutter build linux --release
          fi

      - name: Create tarball
        run: |
          cd build/linux/x64/release
          tar -czvf ../../../../MyNAS-${{ needs.extract-version.outputs.version }}-linux-x64.tar.gz bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-app-x64
          path: MyNAS-*.tar.gz
          retention-days: 3

  # 构建 Linux arm64
  build-linux-arm64:
    needs: extract-version
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev libsecret-1-dev libkeybinder-3.0-dev curl git unzip xz-utils

      # 手动安装 Flutter (flutter-action 不支持 ARM64 Linux)
      - name: Install Flutter manually
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 ~/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Setup Flutter
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter --version
          flutter config --enable-linux-desktop
          flutter precache --linux

      # 清理可能损坏的构建缓存
      - name: Clean build cache
        run: |
          rm -rf build/
          rm -rf .dart_tool/

      - name: Get dependencies
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter pub get

      - name: Generate code
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          dart run build_runner build --delete-conflicting-outputs

      # 重试构建（如果失败，清理后重试一次）
      - name: Build Linux ARM64 (with retry)
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          if ! flutter build linux --release; then
            echo "First build attempt failed, cleaning and retrying..."
            rm -rf build/linux
            flutter clean
            flutter pub get
            flutter build linux --release
          fi

      - name: Create tarball
        run: |
          cd build/linux/arm64/release
          tar -czvf ../../../../MyNAS-${{ needs.extract-version.outputs.version }}-linux-arm64.tar.gz bundle

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-app-arm64
          path: MyNAS-*.tar.gz
          retention-days: 3

  # 生成更新日志
  generate-changelog:
    needs: extract-version
    if: always() && needs.extract-version.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      stats: ${{ steps.changelog.outputs.stats }}
      previous_tag: ${{ steps.changelog.outputs.previous_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          FULL_VERSION="${{ needs.extract-version.outputs.full_version }}"

          # 获取上一个 tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

          # 获取提交范围
          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE="HEAD~20..HEAD"
            COMPARE_INFO="首次发布"
          else
            RANGE="$PREVIOUS_TAG..HEAD"
            COMPARE_INFO="与 $PREVIOUS_TAG 相比"
          fi

          # 统计信息
          COMMIT_COUNT=$(git rev-list --count $RANGE 2>/dev/null || echo "0")

          if [ -n "$PREVIOUS_TAG" ]; then
            # 获取文件变更统计
            DIFF_STAT=$(git diff --shortstat $PREVIOUS_TAG HEAD 2>/dev/null || echo "")
            FILES_CHANGED=$(echo "$DIFF_STAT" | grep -oE '[0-9]+ file' | grep -oE '[0-9]+' || echo "0")
            INSERTIONS=$(echo "$DIFF_STAT" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "0")
            DELETIONS=$(echo "$DIFF_STAT" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo "0")
          else
            FILES_CHANGED="N/A"
            INSERTIONS="N/A"
            DELETIONS="N/A"
          fi

          # 获取贡献者（通过单次 GitHub API 调用获取）
          echo "Fetching contributors..."
          CONTRIBUTORS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/contributors?per_page=10" \
            | jq -r '.[].login' 2>/dev/null | head -5 | tr '\n' ', ' | sed 's/,$//' | sed 's/,/, /g')
          if [ -z "$CONTRIBUTORS" ]; then
            CONTRIBUTORS="${{ github.repository_owner }}"
          fi
          echo "Contributors: $CONTRIBUTORS"

          # 获取详细提交列表（使用 git log，不调用 API）
          echo "Generating commit list..."
          COMMITS_DETAILED=$(git log $RANGE --pretty=format:"- %s (\`%h\`)" --no-merges 2>/dev/null | head -30)
          echo "Commits found: $(echo "$COMMITS_DETAILED" | wc -l)"
          COMMITS_SIMPLE=$(git log $RANGE --pretty=format:"- %s" --no-merges 2>/dev/null || echo "")

          # 分类提交 - 新功能
          FEATURES=$(echo "$COMMITS_SIMPLE" | grep -iE "^- (feat|feature|新增|添加)" || true)
          FEATURES_DETAILED=$(echo "$COMMITS_DETAILED" | grep -iE "^- (feat|feature|新增|添加)" || true)

          # 分类提交 - Bug修复
          FIXES=$(echo "$COMMITS_SIMPLE" | grep -iE "^- (fix|修复|bugfix|bug)" || true)
          FIXES_DETAILED=$(echo "$COMMITS_DETAILED" | grep -iE "^- (fix|修复|bugfix|bug)" || true)

          # 分类提交 - 性能优化
          PERF=$(echo "$COMMITS_SIMPLE" | grep -iE "^- (perf|优化|性能|improve)" || true)
          PERF_DETAILED=$(echo "$COMMITS_DETAILED" | grep -iE "^- (perf|优化|性能|improve)" || true)

          # 分类提交 - 重构
          REFACTOR=$(echo "$COMMITS_SIMPLE" | grep -iE "^- (refactor|重构|restructure)" || true)
          REFACTOR_DETAILED=$(echo "$COMMITS_DETAILED" | grep -iE "^- (refactor|重构|restructure)" || true)

          # 分类提交 - 文档
          DOCS=$(echo "$COMMITS_SIMPLE" | grep -iE "^- (doc|docs|文档|readme)" || true)
          DOCS_DETAILED=$(echo "$COMMITS_DETAILED" | grep -iE "^- (doc|docs|文档|readme)" || true)

          # 分类提交 - 样式/UI
          STYLE=$(echo "$COMMITS_SIMPLE" | grep -iE "^- (style|ui|界面|样式|css)" || true)
          STYLE_DETAILED=$(echo "$COMMITS_DETAILED" | grep -iE "^- (style|ui|界面|样式|css)" || true)

          # 分类提交 - 构建/CI
          BUILD=$(echo "$COMMITS_SIMPLE" | grep -iE "^- (build|ci|chore|构建|依赖|deploy)" || true)
          BUILD_DETAILED=$(echo "$COMMITS_DETAILED" | grep -iE "^- (build|ci|chore|构建|依赖|deploy)" || true)

          # 其他提交
          OTHERS=$(echo "$COMMITS_SIMPLE" | grep -viE "^- (feat|feature|fix|修复|bugfix|bug|perf|优化|性能|improve|refactor|重构|doc|docs|文档|readme|style|ui|界面|样式|css|build|ci|chore|构建|依赖|deploy|新增|添加)" || true)
          OTHERS_DETAILED=$(echo "$COMMITS_DETAILED" | grep -viE "^- (feat|feature|fix|修复|bugfix|bug|perf|优化|性能|improve|refactor|重构|doc|docs|文档|readme|style|ui|界面|样式|css|build|ci|chore|构建|依赖|deploy|新增|添加)" || true)

          # 构建 changelog
          CHANGELOG=""

          # 统计概览
          CHANGELOG="${CHANGELOG}### 📊 版本概览\n\n"
          CHANGELOG="${CHANGELOG}| 指标 | 数值 |\n"
          CHANGELOG="${CHANGELOG}|------|------|\n"
          CHANGELOG="${CHANGELOG}| 提交数量 | ${COMMIT_COUNT} |\n"
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG="${CHANGELOG}| 文件变更 | ${FILES_CHANGED} |\n"
            CHANGELOG="${CHANGELOG}| 新增行数 | +${INSERTIONS} |\n"
            CHANGELOG="${CHANGELOG}| 删除行数 | -${DELETIONS} |\n"
          fi
          CHANGELOG="${CHANGELOG}| 贡献者 | ${CONTRIBUTORS} |\n\n"

          if [ -n "$FEATURES_DETAILED" ]; then
            FEATURE_COUNT=$(echo "$FEATURES" | grep -c "^-" || echo "0")
            CHANGELOG="${CHANGELOG}### ✨ 新功能 (${FEATURE_COUNT})\n${FEATURES_DETAILED}\n\n"
          fi

          if [ -n "$FIXES_DETAILED" ]; then
            FIX_COUNT=$(echo "$FIXES" | grep -c "^-" || echo "0")
            CHANGELOG="${CHANGELOG}### 🐛 Bug 修复 (${FIX_COUNT})\n${FIXES_DETAILED}\n\n"
          fi

          if [ -n "$PERF_DETAILED" ]; then
            PERF_COUNT=$(echo "$PERF" | grep -c "^-" || echo "0")
            CHANGELOG="${CHANGELOG}### ⚡ 性能优化 (${PERF_COUNT})\n${PERF_DETAILED}\n\n"
          fi

          if [ -n "$REFACTOR_DETAILED" ]; then
            REFACTOR_COUNT=$(echo "$REFACTOR" | grep -c "^-" || echo "0")
            CHANGELOG="${CHANGELOG}### ♻️ 代码重构 (${REFACTOR_COUNT})\n${REFACTOR_DETAILED}\n\n"
          fi

          if [ -n "$STYLE_DETAILED" ]; then
            STYLE_COUNT=$(echo "$STYLE" | grep -c "^-" || echo "0")
            CHANGELOG="${CHANGELOG}### 🎨 界面优化 (${STYLE_COUNT})\n${STYLE_DETAILED}\n\n"
          fi

          if [ -n "$BUILD_DETAILED" ]; then
            BUILD_COUNT=$(echo "$BUILD" | grep -c "^-" || echo "0")
            CHANGELOG="${CHANGELOG}### 🔧 构建/CI (${BUILD_COUNT})\n${BUILD_DETAILED}\n\n"
          fi

          if [ -n "$DOCS_DETAILED" ]; then
            DOCS_COUNT=$(echo "$DOCS" | grep -c "^-" || echo "0")
            CHANGELOG="${CHANGELOG}### 📚 文档更新 (${DOCS_COUNT})\n${DOCS_DETAILED}\n\n"
          fi

          if [ -n "$OTHERS_DETAILED" ]; then
            OTHERS_COUNT=$(echo "$OTHERS" | grep -c "^-" || echo "0")
            CHANGELOG="${CHANGELOG}### 📝 其他更新 (${OTHERS_COUNT})\n${OTHERS_DETAILED}\n\n"
          fi

          # 如果没有任何分类，显示所有提交
          if [ -z "$FEATURES_DETAILED" ] && [ -z "$FIXES_DETAILED" ] && [ -z "$PERF_DETAILED" ] && [ -z "$REFACTOR_DETAILED" ] && [ -z "$STYLE_DETAILED" ] && [ -z "$BUILD_DETAILED" ] && [ -z "$DOCS_DETAILED" ] && [ -z "$OTHERS_DETAILED" ]; then
            CHANGELOG="${CHANGELOG}### 📝 更新内容\n${COMMITS_DETAILED}\n\n"
          fi

          # 添加版本对比链接
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG="${CHANGELOG}---\n\n"
            CHANGELOG="${CHANGELOG}📋 **完整变更**: [\`${PREVIOUS_TAG}...v${FULL_VERSION}\`](https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...v${FULL_VERSION})\n"
          fi

          # 调试输出
          echo "=== Generated Changelog ==="
          echo -e "$CHANGELOG"
          echo "=== End Changelog ==="

          # 输出到 GITHUB_OUTPUT
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # 输出统计信息
          echo "stats=${COMMIT_COUNT} commits, ${FILES_CHANGED} files changed" >> $GITHUB_OUTPUT

          echo "Changelog generation completed"

  # 创建 Release
  create-release:
    needs: [extract-version, build-android, build-ios, build-macos, build-windows, build-linux, build-linux-arm64, generate-changelog]
    # 只要有一个构建成功就创建 release
    if: |
      always() &&
      needs.extract-version.result == 'success' &&
      (needs.build-android.result == 'success' ||
       needs.build-ios.result == 'success' ||
       needs.build-macos.result == 'success' ||
       needs.build-windows.result == 'success' ||
       needs.build-linux.result == 'success' ||
       needs.build-linux-arm64.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # 调试：显示接收到的 changelog
      - name: Debug changelog
        id: debug_changelog
        env:
          CHANGELOG_INPUT: ${{ needs.generate-changelog.outputs.changelog }}
        run: |
          echo "=== Changelog from generate-changelog job ==="
          if [ -z "$CHANGELOG_INPUT" ]; then
            echo "WARNING: Changelog is empty, using default"
            CHANGELOG_INPUT="### 📝 更新内容\n\n此版本包含多项更新和改进。"
          fi
          echo "$CHANGELOG_INPUT"
          echo "=== End ==="
          echo "Stats: ${{ needs.generate-changelog.outputs.stats }}"

          # 保存到 GITHUB_OUTPUT（使用 heredoc 避免特殊字符问题）
          {
            echo 'changelog<<CHANGELOG_EOF'
            echo "$CHANGELOG_INPUT"
            echo 'CHANGELOG_EOF'
          } >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts found"

      # 生成构建状态报告
      - name: Generate build status
        id: build_status
        run: |
          STATUS=""

          if [ "${{ needs.build-android.result }}" == "success" ]; then
            STATUS="${STATUS}✅ Android\n"
          else
            STATUS="${STATUS}❌ Android (构建失败)\n"
          fi

          if [ "${{ needs.build-ios.result }}" == "success" ]; then
            STATUS="${STATUS}✅ iOS\n"
          else
            STATUS="${STATUS}❌ iOS (构建失败)\n"
          fi

          if [ "${{ needs.build-macos.result }}" == "success" ]; then
            STATUS="${STATUS}✅ macOS\n"
          elif [ "${{ needs.build-macos.result }}" == "skipped" ]; then
            STATUS="${STATUS}⏭️ macOS (跳过 - 平台未配置)\n"
          else
            STATUS="${STATUS}❌ macOS (构建失败)\n"
          fi

          if [ "${{ needs.build-windows.result }}" == "success" ]; then
            STATUS="${STATUS}✅ Windows\n"
          elif [ "${{ needs.build-windows.result }}" == "skipped" ]; then
            STATUS="${STATUS}⏭️ Windows (跳过 - 平台未配置)\n"
          else
            STATUS="${STATUS}❌ Windows (构建失败)\n"
          fi

          if [ "${{ needs.build-linux.result }}" == "success" ]; then
            STATUS="${STATUS}✅ Linux x64\n"
          elif [ "${{ needs.build-linux.result }}" == "skipped" ]; then
            STATUS="${STATUS}⏭️ Linux x64 (跳过)\n"
          else
            STATUS="${STATUS}❌ Linux x64 (构建失败)\n"
          fi

          if [ "${{ needs.build-linux-arm64.result }}" == "success" ]; then
            STATUS="${STATUS}✅ Linux ARM64\n"
          elif [ "${{ needs.build-linux-arm64.result }}" == "skipped" ]; then
            STATUS="${STATUS}⏭️ Linux ARM64 (跳过)\n"
          else
            STATUS="${STATUS}❌ Linux ARM64 (构建失败)\n"
          fi

          echo "status<<EOF" >> $GITHUB_OUTPUT
          echo -e "$STATUS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: MyNAS v${{ needs.extract-version.outputs.full_version }}
          tag_name: ${{ needs.extract-version.outputs.tag_name }}
          draft: false
          prerelease: ${{ contains(needs.extract-version.outputs.full_version, 'beta') || contains(needs.extract-version.outputs.full_version, 'alpha') || contains(needs.extract-version.outputs.full_version, 'rc') }}
          files: |
            artifacts/**/*
          body: |
            ## MyNAS v${{ needs.extract-version.outputs.full_version }}

            ${{ steps.debug_changelog.outputs.changelog }}

            ---

            ### 🔨 构建状态

            ${{ steps.build_status.outputs.status }}

            ### 🚀 快速下载（推荐版本）

            | 平台 | 推荐版本 | 下载链接 |
            |------|----------|----------|
            | **Android** | arm64-v8a | [⬇️ MyNAS-${{ needs.extract-version.outputs.version }}-android-arm64-v8a.apk](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-android-arm64-v8a.apk) |
            | **iOS** | arm64 | [⬇️ MyNAS-${{ needs.extract-version.outputs.version }}-ios-arm64.ipa](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-ios-arm64.ipa) |
            | **macOS (Apple Silicon)** | arm64 | [⬇️ MyNAS-${{ needs.extract-version.outputs.version }}-macos-arm64.dmg](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-macos-arm64.dmg) |
            | **macOS (Intel)** | x86_64 | [⬇️ MyNAS-${{ needs.extract-version.outputs.version }}-macos-x86_64.dmg](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-macos-x86_64.dmg) |
            | **Windows** | x64 安装包 | [⬇️ MyNAS-${{ needs.extract-version.outputs.version }}-windows-x64-setup.exe](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-windows-x64-setup.exe) |
            | **Linux** | x64 | [⬇️ MyNAS-${{ needs.extract-version.outputs.version }}-linux-x64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-linux-x64.tar.gz) |
            | **Linux (ARM)** | arm64 | [⬇️ MyNAS-${{ needs.extract-version.outputs.version }}-linux-arm64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-linux-arm64.tar.gz) |

            ---

            ### 📦 全部下载

            <details>
            <summary>Android (点击展开)</summary>

            | 架构 | 说明 | 下载 |
            |------|------|------|
            | arm64-v8a | 64位 ARM (推荐，大多数现代手机) | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-android-arm64-v8a.apk) |
            | armeabi-v7a | 32位 ARM (旧设备) | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-android-armeabi-v7a.apk) |
            | x86_64 | 64位 x86 (模拟器/Chromebook) | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-android-x86_64.apk) |
            | universal | 通用包 (包含所有架构) | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-android-universal.apk) |

            </details>

            <details>
            <summary>iOS (点击展开)</summary>

            | 架构 | 说明 | 下载 |
            |------|------|------|
            | arm64 | iPhone/iPad (未签名) | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-ios-arm64.ipa) |

            </details>

            <details>
            <summary>macOS (点击展开)</summary>

            | 架构 | 说明 | 下载 |
            |------|------|------|
            | arm64 | Apple Silicon (M1/M2/M3/M4) | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-macos-arm64.dmg) |
            | x86_64 | Intel 芯片 | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-macos-x86_64.dmg) |

            </details>

            <details>
            <summary>Windows (点击展开)</summary>

            | 类型 | 说明 | 下载 |
            |------|------|------|
            | 安装包 | EXE 安装程序 (推荐) | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-windows-x64-setup.exe) |
            | 便携版 | 解压即用，无需安装 | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-windows-x64-portable.zip) |
            | MSIX | Windows 应用商店格式 | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-windows-x64.msix) |

            </details>

            <details>
            <summary>Linux (点击展开)</summary>

            | 架构 | 说明 | 下载 |
            |------|------|------|
            | x64 | 64位 x86 (大多数桌面/服务器) | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-linux-x64.tar.gz) |
            | arm64 | 64位 ARM (树莓派4/5/Arm服务器) | [下载](https://github.com/${{ github.repository }}/releases/download/${{ needs.extract-version.outputs.tag_name }}/MyNAS-${{ needs.extract-version.outputs.version }}-linux-arm64.tar.gz) |

            </details>

            ### ⚠️ 注意事项
            - **iOS**: IPA 未签名，需要自行签名后安装（AltStore/Sideloadly）
            - **macOS**: 应用未签名，首次打开需要在「系统设置 → 隐私与安全性」中允许
            - **Windows**: MSIX 安装包需要信任开发者证书或开启开发者模式
            - **Linux**: 需要安装依赖：`sudo apt install libmpv1 libsecret-1-0`

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
