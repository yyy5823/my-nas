name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  # 也支持手动推送 tag 触发
  create:
    tags:
      - 'v*'

jobs:
  # 检查是否需要发布
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      version_code: ${{ steps.check.outputs.version_code }}
      is_tag: ${{ steps.check.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: check
        run: |
          # 获取当前版本
          CURRENT_VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          VERSION_CODE=$(grep "^version:" pubspec.yaml | sed 's/version: //' | cut -d'+' -f2)
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

          # 检查是否是 tag 触发
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Triggered by tag: ${{ github.ref_name }}"
            exit 0
          fi

          echo "is_tag=false" >> $GITHUB_OUTPUT

          # 检查 pubspec.yaml 是否在本次提交中被修改
          if ! git diff HEAD~1 HEAD --name-only | grep -q "^pubspec.yaml$"; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "pubspec.yaml not changed, skipping release"
            exit 0
          fi

          # 检查版本是否改变
          if git diff HEAD~1 HEAD -- pubspec.yaml | grep -q "^+version:"; then
            # 检查该版本的 tag 是否已存在
            if git ls-remote --tags origin | grep -q "refs/tags/v$CURRENT_VERSION$"; then
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "Tag v$CURRENT_VERSION already exists, skipping release"
            else
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "Version changed to $CURRENT_VERSION, will create release"
            fi
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Version not changed in pubspec.yaml, skipping release"
          fi

  # 创建 Tag
  create-tag:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true' && needs.check-release.outputs.is_tag == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        id: create_tag
        run: |
          TAG_NAME="v${{ needs.check-release.outputs.version }}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

          echo "Created tag: $TAG_NAME"

  # 提取版本信息（用于后续构建）
  extract-version:
    needs: [check-release, create-tag]
    if: always() && needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.check-release.outputs.version }}
      version_code: ${{ needs.check-release.outputs.version_code }}
      tag_name: ${{ steps.get_tag.outputs.tag_name }}
    steps:
      - name: Get tag name
        id: get_tag
        run: |
          if [ "${{ needs.check-release.outputs.is_tag }}" == "true" ]; then
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=v${{ needs.check-release.outputs.version }}" >> $GITHUB_OUTPUT
          fi

  # 构建 Android APK（多架构）
  build-android:
    needs: extract-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # 构建分架构 APK
      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk MyNAS-${{ needs.extract-version.outputs.version }}-android-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk MyNAS-${{ needs.extract-version.outputs.version }}-android-armeabi-v7a.apk
          mv app-x86_64-release.apk MyNAS-${{ needs.extract-version.outputs.version }}-android-x86_64.apk

      # 也构建一个通用 APK（包含所有架构）
      - name: Build universal APK
        run: flutter build apk --release

      - name: Rename universal APK
        run: |
          cd build/app/outputs/flutter-apk
          mv app-release.apk MyNAS-${{ needs.extract-version.outputs.version }}-android-universal.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/MyNAS-*.apk

  # 构建 iOS IPA
  build-ios:
    needs: extract-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r MyNAS-${{ needs.extract-version.outputs.version }}-ios-arm64.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/MyNAS-*.ipa

  # 构建 macOS（Intel + Apple Silicon）
  build-macos:
    needs: extract-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 检查是否有 macOS 支持
      - name: Check macOS support
        id: check_macos
        run: |
          if [ -d "macos" ]; then
            echo "supported=true" >> $GITHUB_OUTPUT
          else
            echo "supported=false" >> $GITHUB_OUTPUT
            echo "::warning::macOS platform not configured in this project"
          fi

      - name: Enable macOS desktop
        if: steps.check_macos.outputs.supported == 'true'
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        if: steps.check_macos.outputs.supported == 'true'
        run: flutter pub get

      - name: Build macOS
        if: steps.check_macos.outputs.supported == 'true'
        run: flutter build macos --release

      - name: Get architecture
        if: steps.check_macos.outputs.supported == 'true'
        id: arch
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" == "arm64" ]; then
            echo "arch=arm64" >> $GITHUB_OUTPUT
          else
            echo "arch=x86_64" >> $GITHUB_OUTPUT
          fi

      - name: Create DMG
        if: steps.check_macos.outputs.supported == 'true'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "MyNAS" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "my_nas.app" 150 185 \
            --hide-extension "my_nas.app" \
            --app-drop-link 450 185 \
            "MyNAS-${{ needs.extract-version.outputs.version }}-macos-${{ steps.arch.outputs.arch }}.dmg" \
            "build/macos/Build/Products/Release/my_nas.app" || true

          # 如果 create-dmg 失败，创建简单的 zip
          if [ ! -f "MyNAS-${{ needs.extract-version.outputs.version }}-macos-${{ steps.arch.outputs.arch }}.dmg" ]; then
            cd build/macos/Build/Products/Release
            zip -r ../../../../../MyNAS-${{ needs.extract-version.outputs.version }}-macos-${{ steps.arch.outputs.arch }}.zip my_nas.app
          fi

      - name: Upload macOS artifact
        if: steps.check_macos.outputs.supported == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            MyNAS-*.dmg
            MyNAS-*.zip

  # 构建 Windows x64
  build-windows:
    needs: extract-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 检查是否有 Windows 支持
      - name: Check Windows support
        id: check_windows
        shell: bash
        run: |
          if [ -d "windows" ]; then
            echo "supported=true" >> $GITHUB_OUTPUT
          else
            echo "supported=false" >> $GITHUB_OUTPUT
            echo "::warning::Windows platform not configured in this project"
          fi

      - name: Enable Windows desktop
        if: steps.check_windows.outputs.supported == 'true'
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        if: steps.check_windows.outputs.supported == 'true'
        run: flutter pub get

      - name: Build Windows
        if: steps.check_windows.outputs.supported == 'true'
        run: flutter build windows --release

      - name: Create ZIP
        if: steps.check_windows.outputs.supported == 'true'
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath MyNAS-${{ needs.extract-version.outputs.version }}-windows-x64.zip

      - name: Upload Windows artifact
        if: steps.check_windows.outputs.supported == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: MyNAS-*.zip

  # 构建 Linux x64
  build-linux:
    needs: extract-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 检查是否有 Linux 支持
      - name: Check Linux support
        id: check_linux
        run: |
          if [ -d "linux" ]; then
            echo "supported=true" >> $GITHUB_OUTPUT
          else
            echo "supported=false" >> $GITHUB_OUTPUT
            echo "::warning::Linux platform not configured in this project"
          fi

      - name: Enable Linux desktop
        if: steps.check_linux.outputs.supported == 'true'
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        if: steps.check_linux.outputs.supported == 'true'
        run: flutter pub get

      - name: Build Linux
        if: steps.check_linux.outputs.supported == 'true'
        run: flutter build linux --release

      - name: Create tarball
        if: steps.check_linux.outputs.supported == 'true'
        run: |
          cd build/linux/x64/release
          tar -czvf ../../../../MyNAS-${{ needs.extract-version.outputs.version }}-linux-x64.tar.gz bundle

      - name: Upload Linux artifact
        if: steps.check_linux.outputs.supported == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: MyNAS-*.tar.gz

  # 生成更新日志
  generate-changelog:
    needs: extract-version
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -10)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges $PREVIOUS_TAG..HEAD)
          fi

          # 分类提交
          FEATURES=$(echo "$COMMITS" | grep -iE "^- (feat|feature|新增|添加)" || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^- (fix|修复|bugfix)" || true)
          OTHERS=$(echo "$COMMITS" | grep -viE "^- (feat|feature|fix|修复|bugfix|新增|添加)" || true)

          # 构建 changelog
          CHANGELOG=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}### ✨ 新功能\n${FEATURES}\n\n"
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}### 🐛 修复\n${FIXES}\n\n"
          fi

          if [ -n "$OTHERS" ]; then
            CHANGELOG="${CHANGELOG}### 📝 其他\n${OTHERS}\n\n"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="### 更新内容\n${COMMITS}\n"
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # 创建 Release
  create-release:
    needs: [extract-version, build-android, build-ios, build-macos, build-windows, build-linux, generate-changelog]
    # 只要有一个构建成功就创建 release
    if: |
      always() &&
      needs.extract-version.result == 'success' &&
      (needs.build-android.result == 'success' ||
       needs.build-ios.result == 'success' ||
       needs.build-macos.result == 'success' ||
       needs.build-windows.result == 'success' ||
       needs.build-linux.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts found"

      # 生成构建状态报告
      - name: Generate build status
        id: build_status
        run: |
          STATUS=""

          if [ "${{ needs.build-android.result }}" == "success" ]; then
            STATUS="${STATUS}✅ Android\n"
          else
            STATUS="${STATUS}❌ Android (构建失败)\n"
          fi

          if [ "${{ needs.build-ios.result }}" == "success" ]; then
            STATUS="${STATUS}✅ iOS\n"
          else
            STATUS="${STATUS}❌ iOS (构建失败)\n"
          fi

          if [ "${{ needs.build-macos.result }}" == "success" ]; then
            STATUS="${STATUS}✅ macOS\n"
          elif [ "${{ needs.build-macos.result }}" == "skipped" ]; then
            STATUS="${STATUS}⏭️ macOS (跳过 - 平台未配置)\n"
          else
            STATUS="${STATUS}❌ macOS (构建失败)\n"
          fi

          if [ "${{ needs.build-windows.result }}" == "success" ]; then
            STATUS="${STATUS}✅ Windows\n"
          elif [ "${{ needs.build-windows.result }}" == "skipped" ]; then
            STATUS="${STATUS}⏭️ Windows (跳过 - 平台未配置)\n"
          else
            STATUS="${STATUS}❌ Windows (构建失败)\n"
          fi

          if [ "${{ needs.build-linux.result }}" == "success" ]; then
            STATUS="${STATUS}✅ Linux\n"
          elif [ "${{ needs.build-linux.result }}" == "skipped" ]; then
            STATUS="${STATUS}⏭️ Linux (跳过 - 平台未配置)\n"
          else
            STATUS="${STATUS}❌ Linux (构建失败)\n"
          fi

          echo "status<<EOF" >> $GITHUB_OUTPUT
          echo -e "$STATUS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: MyNAS v${{ needs.extract-version.outputs.version }}
          tag_name: ${{ needs.extract-version.outputs.tag_name }}
          draft: false
          prerelease: ${{ contains(needs.extract-version.outputs.version, 'beta') || contains(needs.extract-version.outputs.version, 'alpha') }}
          files: |
            artifacts/**/*
          body: |
            ## MyNAS v${{ needs.extract-version.outputs.version }}

            ${{ needs.generate-changelog.outputs.changelog }}

            ---

            ### 🔨 构建状态

            ${{ steps.build_status.outputs.status }}

            ### 📦 下载

            #### Android
            | 架构 | 说明 | 文件 |
            |------|------|------|
            | arm64-v8a | 64位 ARM (推荐，大多数现代手机) | `MyNAS-*-android-arm64-v8a.apk` |
            | armeabi-v7a | 32位 ARM (旧设备) | `MyNAS-*-android-armeabi-v7a.apk` |
            | x86_64 | 64位 x86 (模拟器/Chromebook) | `MyNAS-*-android-x86_64.apk` |
            | universal | 通用包 (包含所有架构，体积较大) | `MyNAS-*-android-universal.apk` |

            #### iOS
            | 架构 | 文件 |
            |------|------|
            | arm64 | `MyNAS-*-ios-arm64.ipa` (未签名) |

            #### macOS
            | 架构 | 文件 |
            |------|------|
            | arm64 | `MyNAS-*-macos-arm64.dmg` (Apple Silicon) |

            #### Windows
            | 架构 | 文件 |
            |------|------|
            | x64 | `MyNAS-*-windows-x64.zip` |

            #### Linux
            | 架构 | 文件 |
            |------|------|
            | x64 | `MyNAS-*-linux-x64.tar.gz` |

            ### ⚠️ 注意事项
            - **iOS**: IPA 未签名，需要自行签名后安装（AltStore/Sideloadly）
            - **macOS**: 应用未签名，首次打开需要在「系统设置 → 隐私与安全性」中允许
            - **Linux**: 需要安装 `libmpv` 依赖：`sudo apt install libmpv1`

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
