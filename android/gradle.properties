# Gradle JVM args - Optimized for CI (GitHub Actions has 7GB RAM)
# Increase for local development if needed
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Use Java 17+ for Gradle (required by AGP 8.0+)
#org.gradle.java.home=C:/Program Files/Java/jdk-21

# AndroidX
android.useAndroidX=true

# Build performance optimization
android.enableJetifier=false
org.gradle.parallel=true
org.gradle.caching=true

# Fix for plugins without namespace (AGP 8.0+)
android.defaults.buildfeatures.buildconfig=true
android.nonFinalResIds=false
android.nonTransitiveRClass=false

# Disable Kotlin incremental compilation (workaround for cross-drive paths issue)
kotlin.incremental=false

# Force Kotlin JVM target for all modules
kotlin.jvm.target.validation.mode=warning
